backend:
  name: github
  repo: andrealbiac/la-peseta
  branch: main
  base_url: https://sunny-pudding-05420f.netlify.app

media_folder: img

collections:
  - name: "textos"
    label: "Textos del sitio"
    files:
      - name: "es"
        label: "Textos en español"
        file: "i18n.json"
        fields:
          - label: "Español"
            name: "es"
            widget: "object"
            fields:
              - {label: "Descripción (meta)", name: "meta.description", widget: "string"}
              - {label: "Nota de portada", name: "cover.bottom_note", widget: "string"}
              - {label: "Intro hero", name: "hero.intro", widget: "string"}
              - {label: "Título sección cursos", name: "summary.heading", widget: "string"}
              # Curso 1
              - {label: "Curso 1 · Título", name: "summary.c1.title", widget: "string"}
              - {label: "Curso 1 · Descripción corta", name: "summary.c1.desc", widget: "text"}
              - {label: "Curso 1 · Día y hora", name: "course1.dd_day", widget: "string"}
              - {label: "Curso 1 · Lugar", name: "course1.dd_place", widget: "string"}
              - {label: "Curso 1 · Precio", name: "course1.dd_price", widget: "string"}
              - {label: "Curso 1 · Sesiones", name: "course1.dd_sessions", widget: "string"}
              - {label: "Curso 1 · Texto principal", name: "course1.body1", widget: "text"}
              - {label: "Curso 1 · Texto secundario", name: "course1.body2", widget: "text"}
              # Curso 2
              - {label: "Curso 2 · Título", name: "summary.c2.title", widget: "string"}
              - {label: "Curso 2 · Descripción corta", name: "summary.c2.desc", widget: "text"}
              - {label: "Curso 2 · Día y hora", name: "course2.dd_day", widget: "string"}
              - {label: "Curso 2 · Lugar", name: "course2.dd_place", widget: "string"}
              - {label: "Curso 2 · Precio", name: "course2.dd_price", widget: "string"}
              - {label: "Curso 2 · Sesiones", name: "course2.dd_sessions", widget: "string"}
              - {label: "Curso 2 · Texto principal", name: "course2.body1", widget: "text"}
              - {label: "Curso 2 · Texto secundario", name: "course2.body2", widget: "text"}
              # Taller
              - {label: "Taller · Descripción corta", name: "summary.c3.desc", widget: "text"}
              - {label: "Taller · Día y hora", name: "course3.dd_day", widget: "string"}
              - {label: "Curso 3 · Precio", name: "course3.dd_price", widget: "string"}
              - {label: "Curso 3 · Sesiones", name: "course3.dd_sessions", widget: "string"}
              - {label: "Taller · Texto principal", name: "course3.body1", widget: "text"}
              # Sobre mí
              - {label: "About · Párrafo 1", name: "about.p1", widget: "text"}
              - {label: "About · Párrafo 2", name: "about.p2", widget: "text"}
              - {label: "About · Párrafo 3", name: "about.p3", widget: "text"}
              - {label: "About · Párrafo 4", name: "about.p4", widget: "text"}
