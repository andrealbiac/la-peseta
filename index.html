<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Peseta - Estudios</title>
    <meta
      name="description"
      content="Un espacio para investigar la creación de canciones y encontrar a otros con quienes compartir el proceso."
    />
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./img/favicon.png" />
    <meta property="og:title" content="La Peseta - Estudios" />
    <meta
      property="og:description"
      content="Un espacio para investigar la creación de canciones y encontrar a otros con quienes compartir el proceso."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./img/thumbnail.png" />
    <meta
      property="og:image:alt"
      content="Estudios La Peseta — composición de letras e ilustraciones"
    />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="La Peseta - Estudios" />
    <meta
      name="twitter:description"
      content="Un espacio para investigar la creación de canciones y encontrar a otros con quienes compartir el proceso."
    />
    <meta name="twitter:image" content="./img/thumbnail.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <section
      class="cover-section"
      aria-label="Composición gráfica La Peseta Estudios"
      data-i18n-attr="aria-label:cover.aria_label"
    >
      <div class="lang-toggle" data-lang-toggle>
        <span class="lang-toggle__code lang-toggle__code--spa" aria-hidden="true">SPA</span>
        <button
          type="button"
          class="lang-toggle__switch"
          data-lang-switch
          role="switch"
          aria-checked="false"
          aria-label="Cambiar el sitio a inglés"
        >
          <span class="lang-toggle__thumb"></span>
        </button>
        <span class="lang-toggle__code lang-toggle__code--eng" aria-hidden="true">ENG</span>
      </div>

      <div class="letters" aria-hidden="true">
        <div class="letter letter--l">
          <img src="./img/L.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--a-a1">
          <img src="./img/A-1.svg" alt="" draggable="false" />
        </div>

        <div class="letter letter--p">
          <img src="./img/P.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--e-e1">
          <img src="./img/E-1.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--s">
          <img src="./img/S.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--e-e2">
          <img src="./img/E-2.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--t">
          <img src="./img/T.svg" alt="" draggable="false" />
        </div>
        <div class="letter letter--a-a2">
          <img src="./img/A-2.svg" alt="" draggable="false" />
        </div>
      </div>

      <div class="stickers">
        <img class="sticker sticker--guitar" src="./img/guitar.png" alt="" draggable="false" />
        <img class="sticker sticker--lamp" src="./img/lamp.png" alt="" draggable="false" />
        <img class="sticker sticker--mug" src="./img/mup.png" alt="" draggable="false" />
        <img class="sticker sticker--bag" src="./img/bag.png" alt="" draggable="false" />
      </div>

      <div class="cover-drag-cue" aria-hidden="true">
        <p class="cover-drag-cue__text" data-i18n="cover.drag_cue"></p>
        <img
          class="cover-drag-cue__arrow"
          src="./img/arrow.svg"
          alt=""
          width="62"
          height="86"
          draggable="false"
        />
      </div>

      <div class="centerOverlay">
        <img
          class="estudios"
          src="./img/estudios.svg"
          alt="Estudios"
          data-i18n-attr="alt:cover.estudios_alt"
          draggable="false"
        />

        <div class="playWrap">
          <img
            class="play"
            src="./img/play.svg"
            alt="Reproducir"
            data-i18n-attr="alt:cover.play_alt"
            draggable="false"
          />
        </div>
      </div>

      <p class="bottomNote" data-i18n="cover.bottom_note"></p>
    </section>

    <section class="block-section block-1" aria-label="Bloque 1" data-i18n-attr="aria-label:block1.aria">
      <div class="hero">
        <div class="hero-notebook" aria-hidden="true"><img src="./img/notebook-circles.svg" alt="" /></div>
        <div class="hero-content">
          <img class="hero-logo" src="./img/logo.svg" alt="" />
          <img class="hero-main-image" src="./img/main-illustration.png" alt="" />
          <p data-i18n="hero.intro"></p>
        </div>
      </div>

      <div class="summary">
        <h2 class="summary-heading" data-i18n="summary.heading"></h2>
        <div class="summary-inner">
          <ol class="summary-courses" role="list">
            <li class="summary-course">
              <span class="summary-course-badge" aria-hidden="true">1</span>
              <div class="summary-course-body">
                <span class="summary-course-kind" data-i18n="summary.c1.kind"></span>
                <h3 class="summary-course-title" data-i18n="summary.c1.title"></h3>
                <p class="summary-course-desc" data-i18n="summary.c1.desc"></p>
              </div>
            </li>
            <li class="summary-course">
              <span class="summary-course-badge" aria-hidden="true">2</span>
              <div class="summary-course-body">
                <span class="summary-course-kind" data-i18n="summary.c2.kind"></span>
                <h3 class="summary-course-title" data-i18n="summary.c2.title"></h3>
                <p class="summary-course-desc" data-i18n="summary.c2.desc"></p>
              </div>
            </li>
            <li class="summary-course">
              <span class="summary-course-badge" aria-hidden="true">3</span>
              <div class="summary-course-body">
                <h3 class="summary-course-title" data-i18n="summary.c3.title"></h3>
                <p class="summary-course-desc" data-i18n="summary.c3.desc"></p>
              </div>
            </li>
          </ol>
        </div>
      </div>
    </section>

    <section class="block-section block-2" aria-label="Cursos" data-i18n-attr="aria-label:block2.aria">
      <nav class="index" aria-label="Índice de cursos" data-i18n-attr="aria-label:index.nav_aria">
        <a
          id="index-link-composicion"
          class="index-btn index-btn--1 is-active"
          href="#course-composicion"
          aria-current="true"
        >
          <img class="index-btn-shape" src="./img/Rectangle 5.svg" alt="" width="774" height="230" />
          <span class="index-btn-label">
            <span class="index-btn-text-desktop" data-i18n="index.c1.desktop"></span>
            <span class="index-btn-text-mobile" data-i18n="index.c1.mobile"></span>
          </span>
        </a>
        <a id="index-link-produccion" class="index-btn index-btn--2" href="#course-produccion">
          <img class="index-btn-shape" src="./img/Rectangle 4.svg" alt="" width="774" height="232" />
          <span class="index-btn-label">
            <span class="index-btn-text-desktop" data-i18n="index.c2.desktop"></span>
            <span class="index-btn-text-mobile" data-i18n="index.c2.mobile"></span>
          </span>
        </a>
        <a id="index-link-taller" class="index-btn index-btn--3" href="#course-taller">
          <img class="index-btn-shape" src="./img/Rectangle 6.svg" alt="" width="774" height="230" />
          <span class="index-btn-label">
            <span class="index-btn-text-desktop" data-i18n="index.c3.desktop"></span>
            <span class="index-btn-text-mobile" data-i18n="index.c3.mobile"></span>
          </span>
        </a>
      </nav>

      <div class="courses" lang="es">
        <article id="course-composicion" class="course-block" tabindex="-1">
          <header class="course-header">
            <div class="course-num-wrap">
              <span class="course-num">1</span>
            </div>
            <div class="course-heading">
              <span class="course-kind" data-i18n="course1.kind"></span>
              <h2 class="course-title" data-i18n="course1.title"></h2>
            </div>
          </header>
          <ul class="course-tags">
            <li data-i18n="course1.tag1"></li>
            <li data-i18n="course1.tag2"></li>
            <li data-i18n="course1.tag3"></li>
          </ul>
          <div class="course-body">
            <p data-i18n="course1.body1"></p>
            <p data-i18n="course1.body2"></p>
          </div>
          <div class="course-details">
            <dl>
              <dt data-i18n="course1.dt_day"></dt>
              <dd data-i18n="course1.dd_day"></dd>
              <dt data-i18n="course1.dt_place"></dt>
              <dd data-i18n="course1.dd_place"></dd>
              <dt data-i18n="course1.dt_price"></dt>
              <dd data-i18n="course1.dd_price"></dd>
              <dt data-i18n="course1.dt_sessions"></dt>
              <dd data-i18n="course1.dd_sessions"></dd>
            </dl>
          </div>
          <p class="course-cta-wrap">
            <a class="course-cta" href="https://docs.google.com/forms/d/e/1FAIpQLSfhP8kkfZj7gM2pUsheO0VXWoWkTr3j2cqgIhmTIB4kqVMAKQ/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" data-i18n="course1.cta" data-i18n-attr="href:course1.cta_href"></a>
          </p>
        </article>

        <article id="course-produccion" class="course-block" tabindex="-1">
          <header class="course-header">
            <div class="course-num-wrap">
              <span class="course-num">2</span>
            </div>
            <div class="course-heading">
              <span class="course-kind" data-i18n="course2.kind"></span>
              <h2 class="course-title" data-i18n="course2.title"></h2>
            </div>
          </header>
          <ul class="course-tags">
            <li data-i18n="course2.tag1"></li>
            <li data-i18n="course2.tag2"></li>
            <li data-i18n="course2.tag3"></li>
          </ul>
          <div class="course-body">
            <p data-i18n="course2.body1"></p>
            <p data-i18n="course2.body2"></p>
          </div>
          <div class="course-details">
            <dl>
              <dt data-i18n="course2.dt_day"></dt>
              <dd data-i18n="course2.dd_day"></dd>
              <dt data-i18n="course2.dt_place"></dt>
              <dd data-i18n="course2.dd_place"></dd>
              <dt data-i18n="course2.dt_price"></dt>
              <dd data-i18n="course2.dd_price"></dd>
              <dt data-i18n="course2.dt_sessions"></dt>
              <dd data-i18n="course2.dd_sessions"></dd>
            </dl>
          </div>
          <p class="course-cta-wrap">
            <a class="course-cta" href="https://docs.google.com/forms/d/e/1FAIpQLSerOalJ4lUzJYSBVFsRDfwv6PD7WN4xIXf7FGTI5Qpzy9G9tw/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" data-i18n="course2.cta" data-i18n-attr="href:course2.cta_href"></a>
          </p>
        </article>

        <article id="course-taller" class="course-block" tabindex="-1">
          <header class="course-header">
            <div class="course-num-wrap">
              <span class="course-num">3</span>
            </div>
            <div class="course-heading">
              <span class="course-kind" data-i18n="course3.kind"></span>
              <h2 class="course-title" data-i18n="course3.title"></h2>
            </div>
          </header>
          <ul class="course-tags">
            <li data-i18n="course3.tag1"></li>
            <li data-i18n="course3.tag2"></li>
            <li data-i18n="course3.tag3"></li>
          </ul>
          <div class="course-body">
            <p data-i18n="course3.body1"></p>
          </div>
          <div class="course-details">
            <dl>
              <dt data-i18n="course3.dt_day"></dt>
              <dd data-i18n="course3.dd_day"></dd>
              <dt data-i18n="course3.dt_mode"></dt>
              <dd data-i18n="course3.dd_mode"></dd>
              <dt data-i18n="course3.dt_price"></dt>
              <dd data-i18n="course3.dd_price"></dd>
              <dt data-i18n="course3.dt_sessions"></dt>
              <dd data-i18n="course3.dd_sessions"></dd>
            </dl>
          </div>
          <p class="course-cta-wrap">
            <a class="course-cta" href="https://docs.google.com/forms/d/e/1FAIpQLSfbGJCuN9aG7GPEBeRcRW4taLj2nHAtrZOVT4AOsYSJjqB5Qg/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" data-i18n="course3.cta" data-i18n-attr="href:course3.cta_href"></a>
          </p>
        </article>
      </div>
    </section>

    <section class="block-section block-3" aria-label="Bloque 3" data-i18n-attr="aria-label:block3.aria">
      <div class="opinions-about-div">
        <div class="opinions-panel">
          <div class="opinions-stack" id="opinions-stack" tabindex="0">
            <article class="opinion-tile opinion-tile--blue">
              <blockquote class="opinion-tile-quote" data-i18n="opinion1.quote"></blockquote>
              <p class="opinion-tile-author">María, ES</p>
            </article>
            <article class="opinion-tile opinion-tile--yellow">
              <blockquote class="opinion-tile-quote" data-i18n="opinion2.quote"></blockquote>
              <p class="opinion-tile-author">Laura, ES</p>
            </article>
            <article class="opinion-tile opinion-tile--red">
              <blockquote class="opinion-tile-quote" data-i18n="opinion3.quote"></blockquote>
              <p class="opinion-tile-author">Paula, ES</p>
            </article>
            <article class="opinion-tile opinion-tile--dark-green">
              <blockquote class="opinion-tile-quote" data-i18n="opinion4.quote"></blockquote>
              <p class="opinion-tile-author">Sara, ES</p>
            </article>
          </div>
        </div>
        <div class="about" lang="es">
          <h2 class="about-title" data-i18n="about.title"></h2>
          <p data-i18n="about.p1"></p>
          <p data-i18n="about.p2"></p>
          <p data-i18n="about.p3"></p>
          <p data-i18n="about.p4"></p>
          <img
            class="about-photo"
            src="./img/andrea.png"
            alt="Andrea Lafuente"
            data-i18n-attr="alt:about.photo_alt"
          />
        </div>
      </div>
      <div class="playground">
        <div id="playground-stage" class="playground__stage" aria-hidden="true"></div>
      </div>
    </section>

    <footer class="site-footer">
      <nav class="site-footer-links" aria-label="Contacto y newsletter" data-i18n-attr="aria-label:footer.nav_aria">
        <a class="site-footer-link" href="mailto:estudios.lapeseta@gmail.com">estudios.lapeseta@gmail.com</a>
        <a class="site-footer-link" href="https://lapeseta.substack.com" target="_blank" rel="noopener noreferrer" data-i18n="footer.newsletter_label"></a>
      </nav>
      <p class="site-footer-credit">
        <span data-i18n="footer.credit_prefix"></span>
        <a class="site-footer-link" href="https://andreaalbiac.com" target="_blank" rel="noopener noreferrer">Andrea Albiac</a>
      </p>
    </footer>
    <script src="./i18n.js"></script>
    <script src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="./playground.js"></script>
  </body>
</html>
